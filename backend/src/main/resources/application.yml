spring:
  application:
    name: pep-backend
  datasource:
    url: ${PEP_DATABASE_URL:jdbc:h2:mem:pep;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${PEP_DATABASE_USERNAME:pep}
    password: ${PEP_DATABASE_PASSWORD:pep}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

pep:
  labs:
    namespace-prefix: pep-labs
    default-cpu-limit: "500m"
    default-memory-limit: "512Mi"
    default-ttl-hours: 168
