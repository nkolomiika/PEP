spring:
  application:
    name: pep-backend
  datasource:
    url: ${PEP_DATABASE_URL:jdbc:h2:mem:pep;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${PEP_DATABASE_USERNAME:pep}
    password: ${PEP_DATABASE_PASSWORD:pep}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

pep:
  labs:
    namespace-prefix: pep-labs
    default-cpu-limit: "500m"
    default-memory-limit: "512Mi"
    default-ttl-hours: 168
  validation-worker:
    enabled: ${PEP_VALIDATION_WORKER_ENABLED:false}
    poll-interval-ms: ${PEP_VALIDATION_WORKER_POLL_INTERVAL_MS:5000}
    host-address: ${PEP_VALIDATION_WORKER_HOST_ADDRESS:host.docker.internal}
    command-timeout-seconds: ${PEP_VALIDATION_WORKER_COMMAND_TIMEOUT_SECONDS:120}
    health-timeout-seconds: ${PEP_VALIDATION_WORKER_HEALTH_TIMEOUT_SECONDS:30}
