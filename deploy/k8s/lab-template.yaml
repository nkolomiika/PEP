apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-student-lab
  namespace: pep-labs-example
  labels:
    pep.dev/workload: lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-student-lab
  template:
    metadata:
      labels:
        app: sample-student-lab
        pep.dev/workload: lab
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: pep-local-registry:5000/vulnerable-sqli-demo:latest
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sample-student-lab
  namespace: pep-labs-example
spec:
  selector:
    app: sample-student-lab
  ports:
    - port: 8080
      targetPort: 8080
