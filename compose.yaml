services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pep
      POSTGRES_USER: pep
      POSTGRES_PASSWORD: pep
    ports:
      - "5432:5432"
    volumes:
      - pep-postgres:/var/lib/postgresql/data

  backend:
    build: ./backend
    user: root
    environment:
      PEP_DATABASE_URL: jdbc:postgresql://postgres:5432/pep
      PEP_DATABASE_USERNAME: pep
      PEP_DATABASE_PASSWORD: pep
      PEP_DEMO_DATA_ENABLED: "true"
      PEP_VALIDATION_WORKER_ENABLED: "true"
      PEP_VALIDATION_WORKER_HOST_ADDRESS: host.docker.internal
      PEP_USER_STANDS_ENABLED: "true"
      PEP_USER_STANDS_HOST_ADDRESS: host.docker.internal
      PEP_STORAGE_S3_ENABLED: "true"
      PEP_STORAGE_S3_ENDPOINT: http://minio:9000
      PEP_STORAGE_S3_REGION: us-east-1
      PEP_STORAGE_S3_BUCKET: pep-user-stands
      PEP_STORAGE_S3_SYSTEM_BUCKET: pep-system-tasks
      PEP_STORAGE_S3_ACCESS_KEY: minioadmin
      PEP_STORAGE_S3_SECRET_KEY: minioadmin
      PEP_STORAGE_S3_PATH_STYLE_ACCESS: "true"
      PEP_SYSTEM_TASKS_ENABLED: "true"
      PEP_SYSTEM_TASKS_HOST_ADDRESS: host.docker.internal
    depends_on:
      - postgres
      - minio
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
      - "5443:443"

  registry:
    image: registry:2
    container_name: pep-local-registry
    ports:
      - "5001:5000"

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: pep-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - pep-minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  k8s-toolbox:
    build: ./deploy/toolbox
    container_name: pep-k8s-toolbox
    working_dir: /workspace
    environment:
      KUBECONFIG: /kube/config
      KIND_CLUSTER_NAME: pep-local
      TOOLBOX_CONTAINER_NAME: pep-k8s-toolbox
      REGISTRY_CONTAINER_NAME: pep-local-registry
    volumes:
      - .:/workspace
      - pep-kubeconfig:/kube
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "18080:18080"

volumes:
  pep-postgres:
  pep-kubeconfig:
  pep-minio:
