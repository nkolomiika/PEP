services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pep
      POSTGRES_USER: pep
      POSTGRES_PASSWORD: pep
    ports:
      - "5432:5432"
    volumes:
      - pep-postgres:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      PEP_DATABASE_URL: jdbc:postgresql://postgres:5432/pep
      PEP_DATABASE_USERNAME: pep
      PEP_DATABASE_PASSWORD: pep
    depends_on:
      - postgres
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pep-postgres:
