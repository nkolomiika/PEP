services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pep
      POSTGRES_USER: pep
      POSTGRES_PASSWORD: pep
    ports:
      - "5432:5432"
    volumes:
      - pep-postgres:/var/lib/postgresql/data

  backend:
    build: ./backend
    user: root
    environment:
      PEP_DATABASE_URL: jdbc:postgresql://postgres:5432/pep
      PEP_DATABASE_USERNAME: pep
      PEP_DATABASE_PASSWORD: pep
      PEP_VALIDATION_WORKER_ENABLED: "true"
      PEP_VALIDATION_WORKER_HOST_ADDRESS: host.docker.internal
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

  registry:
    image: registry:2
    container_name: pep-local-registry
    ports:
      - "5001:5000"

  k8s-toolbox:
    build: ./deploy/toolbox
    container_name: pep-k8s-toolbox
    working_dir: /workspace
    environment:
      KUBECONFIG: /kube/config
      KIND_CLUSTER_NAME: pep-local
      TOOLBOX_CONTAINER_NAME: pep-k8s-toolbox
      REGISTRY_CONTAINER_NAME: pep-local-registry
    volumes:
      - .:/workspace
      - pep-kubeconfig:/kube
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "18080:18080"

volumes:
  pep-postgres:
  pep-kubeconfig:
